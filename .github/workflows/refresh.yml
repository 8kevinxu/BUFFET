name: refresh-data

on:
  schedule:
    - cron: "17 13 * * 1" # Mondays 13:17 UTC — spending moves quarterly, weekly is plenty
  workflow_dispatch:

permissions:
  contents: write
  issues: write # the alert step opens an issue when material awards appear

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pipeline
        run: pip install -e "pipeline[thesis]"

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # playwright-core drives the runner's preinstalled Chrome for the
      # announcement scanner (war.gov TLS-fingerprint-blocks plain clients);
      # if Akamai blocks the runner IP the stage degrades non-fatally
      - name: Install web deps (headless-Chrome fetcher)
        run: npm ci --prefix web

      - name: Run pipeline
        working-directory: pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        # publish validates row counts and exits non-zero if a source silently
        # broke, so a bad scrape fails this job (email alert) instead of
        # committing empty data
        run: python -m buffet.refresh

      - name: Commit changed artifacts
        run: |
          git config user.name "buffet-refresh[bot]"
          git config user.email "actions@users.noreply.github.com"
          git add web/public/data data/ledger.json
          if git diff --cached --quiet; then
            echo "no data changes"
          else
            git commit -m "data: weekly refresh $(date -u +%F)"
            git push
          fi

      # alert delivery: one issue per run window when material announcements
      # exist (>=0.5% of a ticker's revenue, from the DoD daily feed) — GitHub
      # emails the issue, so alerts arrive without watching the dashboard
      - name: Open issue for new material award alerts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'EOF' > alerts.md || exit 0
          import json, datetime as dt
          a = json.load(open("web/public/data/announce.json"))
          cutoff = (dt.date.today() - dt.timedelta(days=8)).isoformat()
          rows = [r for r in a.get("awards", []) if r.get("alert") and r["date"] >= cutoff]
          if not rows:
              raise SystemExit(1)
          print(f"Material award announcements since {cutoff}:\n")
          for r in rows:
              print(f"- **{r['ticker']}** ${r['amount']/1e6:,.0f}M "
                    f"({r['pct_revenue']:.1%} of revenue) {r['date']} — {r['text'][:180]}…")
          EOF
          if [ -s alerts.md ]; then
            TITLE="Material award alerts — week of $(date -u +%F)"
            if ! gh issue list --search "in:title \"$TITLE\"" --json title -q '.[].title' | grep -qF "$TITLE"; then
              gh issue create --title "$TITLE" --body-file alerts.md
            fi
          fi
